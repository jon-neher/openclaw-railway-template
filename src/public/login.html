<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Setup — Login</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-card);
    }
    .login-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .login-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .login-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-mid);
      margin-bottom: 0.375rem;
    }
    .login-input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 0.875rem;
      font-family: var(--font-sans);
      background: var(--bg-input);
      border: 1px solid var(--border-input);
      border-radius: 0.5rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .login-input:focus {
      border-color: #dc2626;
    }
    .login-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: var(--font-sans);
      color: #fff;
      background: #dc2626;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #b91c1c; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-error {
      margin-top: 0.75rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      color: #dc2626;
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.2);
      border-radius: 0.375rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-wrap" style="margin-bottom:1.5rem">
        <picture>
          <source media="(prefers-color-scheme: light)" srcset="https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/openclaw-logo-text-dark.png">
          <img src="https://raw.githubusercontent.com/openclaw/openclaw/main/docs/assets/openclaw-logo-text.png" alt="OpenClaw" class="logo-img-sm">
        </picture>
      </div>
      <h1 class="login-title">Setup Login</h1>
      <p class="login-subtitle">Enter your SETUP_PASSWORD to continue.</p>
      <form id="login-form">
        <label class="login-label" for="password">Password</label>
        <input class="login-input" id="password" type="password" placeholder="Your SETUP_PASSWORD" autofocus required />
        <button class="login-btn" type="submit" id="login-btn">Sign in</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const btn = document.getElementById('login-btn');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = passwordInput.value;
      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/setup/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
          credentials: 'same-origin'
        });

        const data = await res.json();

        if (data.ok) {
          window.location.href = '/setup';
          return;
        }

        errorEl.textContent = data.error || 'Invalid password. Please try again.';
        errorEl.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
